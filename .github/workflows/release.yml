name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release-zip:
    name: Build ZIP & GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          mkdir -p dist
          zip -r "dist/bouncer-v${{ steps.version.outputs.VERSION }}.zip" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "crawl_samples/*" \
            -x "dist/*" \
            -x "*.sqlite" \
            -x "*.sqlite-shm" \
            -x "*.sqlite-wal" \
            -x ".env" \
            -x "models.json" \
            -x "cloudflared.exe" \
            -x ".DS_Store" \
            -x "Thumbs.db"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Bouncer v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: dist/bouncer-v${{ steps.version.outputs.VERSION }}.zip

  release-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/bouncer:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/bouncer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
